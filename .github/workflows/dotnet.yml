name: dotnet
on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  format:
    name: Check Format
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
    - name: Check Format
      run: dotnet format --verify-no-changes

  test:
    name: Test
    needs: [ format ]
    strategy:
      fail-fast: true
      matrix:
        os: [ macos-latest, ubuntu-latest, windows-latest ]

    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
    - name: Test
      run: dotnet test

  prepare-release:
    if: startsWith(github.ref, 'refs/tags/v')
    name: Prepare Release
    needs: [ test ]
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Create Release
        run: |
          gh release delete "${{ github.ref_name }}" --yes || true
          gh release create "${{ github.ref_name }}" --generate-notes --latest

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    name: Release
    needs: [ prepare-release ]
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
    strategy:
      matrix:
        bin: [ wpksnoop ]
        platform: [
          { ext: macos-arm64, os: macos-latest },
          { ext: linux-amd64, os: ubuntu-latest },
          { ext: windows-amd64.exe, os: windows-latest },
        ]

    runs-on: ${{ matrix.platform.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
      - name: Build
        run: dotnet publish src/WpkSnoop.Cli/WpkSnoop.Cli.csproj -c Release -o bin/
      - name: Upload
        shell: sh
        run: |
          [ "${{ matrix.platform.os }}" = "windows-latest" ] && SRC="bin/${{ matrix.bin }}.exe" || SRC="bin/${{ matrix.bin }}"
          DEST="${{ matrix.bin }}-${{ matrix.platform.ext }}"
          mv "$SRC" "$DEST"
          gh release upload "${{ github.ref_name }}" "$DEST" --clobber
